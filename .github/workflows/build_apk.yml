name: Build Flutter APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GOOGLE_MAPS_ANDROID_KEY: ${{ secrets.GOOGLE_MAPS_ANDROID_KEY }}
      GOOGLE_MAPS_SERVER_KEY: ${{ secrets.GOOGLE_MAPS_SERVER_KEY }}

    steps:
      - name: Checkout repository (full)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          submodules: true

      - name: Show git tracked files (debug)
        run: |
          echo "Git status:" 
          git status --porcelain
          echo "Files under frontend (git ls-files):"
          git ls-files frontend | sed -n '1,200p' || true

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Verify Maps key is present
        run: |
          if [ -z "$GOOGLE_MAPS_ANDROID_KEY" ]; then
            echo "Missing Google Maps API key. Set GOOGLE_MAPS_ANDROID_KEY in GitHub secrets."
            exit 1
          fi

      - name: Flutter doctor (diagnostics)
        working-directory: frontend
        run: flutter doctor -v || true

      - name: List frontend files (debug)
        working-directory: frontend
        run: |
          echo "PWD: $(pwd)"
          echo "Listing frontend root:" 
          ls -la
          echo "Listing lib directory:" 
          ls -la lib || true
          echo "Show tree:" 
          find . -maxdepth 3 -type f -print || true
      - name: Build release APK (verbose)
        working-directory: frontend
        run: flutter build apk --release -v

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: aiseekho-release-apk
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error